name: Build APK
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'
          cache: true

      - name: Salvar código personalizado
        run: cp lib/main.dart /tmp/custom_main.dart

      - name: Criar estrutura do projeto Flutter
        run: flutter create --project-name flutter_app .

      - name: Restaurar main.dart personalizado
        run: cp /tmp/custom_main.dart lib/main.dart

      - name: Adicionar dependência webview
        run: flutter pub add webview_flutter

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 3
